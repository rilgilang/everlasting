# ASSIGN VULNERABILITY ISSUE
assigning-vuln-issues:
  stage: assign-issue
  image: scm.getih.net:5050/it-support/automation-vulnerability-report:latest
  script:
    - python /app/main.py -t ${VULN_GITLAB_TOKEN} -pid ${CI_PROJECT_ID} -u ${CI_SERVER_URL}
  rules:
    - if: $CI_COMMIT_REF_PROTECTED
  dependencies: []
