<!DOCTYPE html>
<html lang="en">

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="x-apple-disable-message-reformatting">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title></title>


  <style type="text/css">
    @media only screen and (min-width: 600px) {
      .u-row {
        width: 600px !important;
      }

      .u-row .u-col {
        vertical-align: top;
      }

      .u-row .u-col-100 {
        width: 600px !important;
      }
    }

    @media only screen and (max-width: 600px) {
      .u-row-container {
        max-width: 100% !important;
        padding-left: 0px !important;
        padding-right: 0px !important;
      }

      .u-row .u-col {
        min-width: 320px !important;
        max-width: 100% !important;
        display: block !important;
      }

      .u-row {
        width: 100% !important;
      }

      .u-col {
        width: 100% !important;
      }

      .u-col>div {
        margin: 0 auto;
      }
    }

    @media (max-width: 480px) {
      #u_content_image_4 .v-src-width {
        width: auto !important;
      }

      #u_content_image_4 .v-src-max-width {
        max-width: 43% !important;
      }

      #u_content_text_2 .v-container-padding-padding {
        padding: 35px 15px 10px !important;
      }

      #u_content_text_3 .v-container-padding-padding {
        padding: 10px 15px 40px !important;
      }
    }
  </style>

  <link href="https://fonts.googleapis.com/css?family=Lato:400,700&display=swap" rel="stylesheet" type="text/css">
  <link href="https://fonts.googleapis.com/css?family=Open+Sans:400,700&display=swap" rel="stylesheet" type="text/css">
</head>

<body>
  <div class="site_body" style="border-collapse: collapse;border-spacing: 0;vertical-align: top;min-width: 320px;margin: 0 auto;background-color: #c2e0f4;width: 100%">
    <div class="container" style="margin: 1px auto;min-width: 320px;max-width: 600px;overflow-wrap: break-word;word-wrap: break-word;word-break: break-word;background-color: #ffffff;font-family: arial, helvetica, sans-serif;">
      {% include './header.html' %}
      <div class="content" style="padding: 0; color: #333;">
        <div class="content__container" style="display: inline-block; width: 100%; margin: 20px 10px 10px;padding: 25px 30px;font-family: Lato, sans-serif;font-size: 16px;line-height: 180%;
        ">
          {% block body %}{% endblock %}
        </div>
      </div>
      {% include './footer.html' %}
    </div>
  </div>

</body>

</html>
