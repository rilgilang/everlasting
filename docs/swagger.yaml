basePath: /api/v1
definitions:
  example.InvalidCredentialResponse:
    properties:
      meta:
        properties:
          code:
            example: bad_request
            type: string
          message:
            example: invalid credential
            type: string
        type: object
    type: object
  example.SuccessfulLoginResponse:
    properties:
      data:
        properties:
          access_token:
            example: your_access_token
            type: string
          refresh_token:
            example: your_refresh_token
            type: string
        type: object
      meta:
        properties:
          code:
            example: ok
            type: string
          message:
            example: Ok
            type: string
        type: object
    type: object
  example.SuccessfulRedeemToken:
    properties:
      data:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJleHAiOjE3MDQzNjI3MTEsImlkIjoiN2IyYWE2MTEtMmViMS00NDI0LWJjNWEtYjg2N2I3MTBmYWQ3Iiwic3ViamVjdCI6InJlc2V0X3Bhc3N3b3JkIn0.G_Uofrg80H4WwoRZzjUH6-UbT_4otd8VwMqNOZOyB5w
        type: string
      meta:
        properties:
          code:
            example: ok
            type: string
          message:
            example: Ok
            type: string
        type: object
    type: object
  example.SuccessfulResetPassword:
    properties:
      meta:
        properties:
          code:
            example: ok
            type: string
          message:
            example: Ok
            type: string
        type: object
    type: object
  example.UserItem:
    properties:
      _id:
        example: 8f364610-6f12-4bed-b7d1-7ea1892803c7
        type: string
      balance:
        example: 240000
        type: number
      created_at:
        type: string
      last_transaction:
        type: string
      name:
        example: markonah
        type: string
      status:
        example: active
        type: string
      updated_at:
        type: string
    type: object
  example.UserResponse:
    properties:
      data:
        $ref: '#/definitions/example.UserItem'
      meta:
        properties:
          code:
            example: ok
            type: string
          message:
            example: Ok
            type: string
        type: object
    type: object
  example.UsersResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/example.UserItem'
        type: array
      meta:
        properties:
          code:
            example: ok
            type: string
          detail:
            properties:
              pagination:
                properties:
                  current_page:
                    example: 1
                    type: integer
                  max_page:
                    example: 2
                    type: integer
                  total_data:
                    example: 10
                    type: integer
                type: object
            type: object
          message:
            example: Ok
            type: string
        type: object
    type: object
  resetpassword.RedeemTokenRequest:
    properties:
      verification_code:
        example: my_verification_code
        type: string
    required:
    - verification_code
    type: object
  resetpassword.ResetPasswordRequest:
    properties:
      email:
        example: xxx@yyy.zzz
        type: string
    required:
    - email
    type: object
  resetpassword.SubmitPasswordRequest:
    properties:
      password:
        example: 1234qweR!
        type: string
      password_confirm:
        example: 1234qweR!
        type: string
    required:
    - password
    type: object
  user.Credential:
    properties:
      email:
        example: admin@klondike.id
        type: string
      password:
        example: 1234qweR!
        type: string
    required:
    - email
    - password
    type: object
  user.UserInput:
    properties:
      email:
        type: string
      name:
        type: string
      role:
        enum:
        - user
        - user-assistant
        type: string
    required:
    - email
    - name
    - role
    type: object
info:
  contact: {}
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user using provided credentials.
      parameters:
      - description: User credentials for login
        in: body
        name: credentials
        required: true
        schema:
          $ref: '#/definitions/user.Credential'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/example.SuccessfulLoginResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/example.InvalidCredentialResponse'
      summary: Handle user login
      tags:
      - Authentication
  /reset-password/redeem-token:
    post:
      consumes:
      - application/json
      parameters:
      - description: resetpassword.RedeemTokenRequest
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/resetpassword.RedeemTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/example.SuccessfulRedeemToken'
      summary: Redeem token from verification code
      tags:
      - Reset Password
  /reset-password/request:
    post:
      consumes:
      - application/json
      parameters:
      - description: resetpassword.ResetPasswordRequest
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/resetpassword.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/example.SuccessfulResetPassword'
      summary: Request reset password email
      tags:
      - Reset Password
  /reset-password/submit:
    put:
      consumes:
      - application/json
      parameters:
      - description: resetpassword.SubmitPasswordRequest
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/resetpassword.SubmitPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/example.SuccessfulRedeemToken'
      security:
      - BearerAuth: []
      summary: Submit new password
      tags:
      - Reset Password
  /user:
    get:
      parameters:
      - description: Search by name.
        in: query
        name: q
        type: string
      - description: Filter by user role
        enum:
        - superadmin
        - admin
        in: query
        name: role
        type: string
      - description: Filter by user status
        enum:
        - active
        - inactive
        in: query
        name: status
        type: string
      - description: Sort by
        enum:
        - created_at
        - name
        - last_transaction
        in: query
        name: sort_by
        type: string
      - description: Sorting order
        enum:
        - asc
        - desc
        in: query
        name: order
        type: string
      - description: Current page, default is 1
        in: query
        name: page
        type: string
      - description: Displayed data per page, default is 20
        in: query
        name: per_page
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/example.UsersResponse'
      security:
      - BearerAuth: []
      summary: Get list of user. Paginated
      tags:
      - User
    post:
      consumes:
      - application/json
      description: |-
        ### Param (JSON Body)
        - name (string) : User Full Name
        - email (string) : User email
      parameters:
      - description: User
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/user.UserInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/example.UserResponse'
      security:
      - BearerAuth: []
      summary: Create new user account
      tags:
      - User
  /user/{id}:
    get:
      parameters:
      - description: user id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/example.UserResponse'
      security:
      - BearerAuth: []
      summary: Get user by id
      tags:
      - User
    put:
      consumes:
      - application/json
      description: |-
        ### Param (JSON Body)
        - name (string) : User Full Name
        - email (string) : User email
      parameters:
      - description: user id
        in: path
        name: id
        required: true
        type: string
      - description: User
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/user.UserInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/example.UserResponse'
      security:
      - BearerAuth: []
      summary: Update user account
      tags:
      - User
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
